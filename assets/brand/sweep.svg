<svg xmlns="http://www.w3.org/2000/svg" width="701" height="175" viewBox="0 0 701 175" role="img" aria-label="Terminal: hearth sweep runs 20 seeded bot playthroughs; 18 run clean, 2 get stuck, and the report includes a copy-paste repro command and a bake command.">
