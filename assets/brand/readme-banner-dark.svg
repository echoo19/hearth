<svg viewBox="0 0 640 200" width="640" height="200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="hearth">
  <!--
    hearth README banner (dark). Generated lockup of the Kept Flame mark
    (assets/brand/hearth-mark-ember.svg geometry, untouched) and a wordmark
    set in Young Serif (OFL), outlined to paths. The flame stays negative
    space per PHILOSOPHY.md; it is cut out via a mask so the counter-shape
    itself can breathe. Animation is CSS-only and gated behind
    prefers-reduced-motion: no-preference, so reduced-motion users (and
    renderers without CSS animation) get the static mark.
  -->
  <title>hearth</title>
  <defs>
    <linearGradient id="ember-dark" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#e5484d"/>
      <stop offset="0.55" stop-color="#f76b15"/>
      <stop offset="1" stop-color="#ffa057"/>
    </linearGradient>
    <mask id="flame-dark" maskUnits="userSpaceOnUse" x="0" y="0" width="48" height="48">
      <rect x="0" y="0" width="48" height="48" fill="#fff"/>
      <g class="flame-sway">
        <g class="flame-breathe">
          <path fill="#000" d="M23.9 38.6
    C 19.8 38.6, 16.8 35.7, 16.8 31.8
    C 16.8 26.9, 21.4 24.9, 24.4 16.0
    C 27.5 19.7, 31.1 24.7, 31.1 30.1
    C 31.1 35.2, 27.9 38.6, 23.9 38.6 Z"/>
        </g>
      </g>
    </mask>
  </defs>
  <style>
    .flame-sway, .flame-breathe {
      transform-box: fill-box;
      transform-origin: 50% 100%;
    }
    @media (prefers-reduced-motion: no-preference) {
      .flame-breathe { animation: hearth-breathe 2.8s cubic-bezier(0.45, 0, 0.55, 1) infinite; }
      .flame-sway { animation: hearth-sway 4.3s cubic-bezier(0.45, 0, 0.55, 1) infinite; }
    }
    @keyframes hearth-breathe {
      0%   { transform: scale(1, 1); }
      27%  { transform: scale(0.962, 1.075); }
      54%  { transform: scale(1.03, 0.968); }
      78%  { transform: scale(0.978, 1.042); }
      100% { transform: scale(1, 1); }
    }
    @keyframes hearth-sway {
      0%   { transform: rotate(0deg); }
      32%  { transform: rotate(-2deg); }
      68%  { transform: rotate(1.7deg); }
      100% { transform: rotate(0deg); }
    }
  </style>
  <g transform="translate(30, 0) scale(3.6)">
    <path fill="url(#ember-dark)" mask="url(#flame-dark)" d="M10 26 A14 14 0 0 1 38 26 L38 39 A3 3 0 0 1 35 42 L13 42 A3 3 0 0 1 10 39 Z"/>
  </g>
