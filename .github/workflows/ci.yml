name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check release coherence
        run: npm run check:release
      - name: Build packages
        run: npm run build:packages
      - name: Typecheck
        run: npm run typecheck
      - name: Cache Electron download
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-33.4.11-${{ runner.os }}
      - name: Run tests
        run: npm test
        env:
          # Enables packages/shipping's real-packager desktop integration test
          # (host platform only; downloads Electron on first run).
          HEARTH_DESKTOP_INTEGRATION: '1'
      - name: Bench harness smoke test (catches harness rot, not perf regressions)
        run: node packages/runtime/bench/bench.mjs --smoke
      - name: Bench regression fence
        run: node packages/runtime/bench/bench.mjs --check
      - name: Regenerate examples (dogfoods the command system)
        run: node packages/examples/generate.mjs
      - name: Examples are clean (byte-identical regen)
        run: git diff --exit-code -- packages/examples
      - name: Regenerate templates (dogfoods the command system)
        run: node packages/templates/generate.mjs
      - name: Templates are clean (byte-identical regen)
        run: git diff --exit-code -- packages/templates
      - name: CLI smoke test
        run: |
          node packages/cli/dist/main.js --help
          node packages/cli/dist/main.js inspect project --json -p packages/examples/mini-platformer
          node packages/cli/dist/main.js validate --json -p packages/examples/mini-platformer
      - name: Example playtests (headless E2E)
        run: |
          node packages/cli/dist/main.js test -p packages/examples/mini-platformer
          node packages/cli/dist/main.js test -p packages/examples/top-down-room
          node packages/cli/dist/main.js test -p packages/examples/visual-novel
          node packages/cli/dist/main.js test -p packages/examples/drift-cellar

  build-editor:
    name: Build editor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build packages
        run: npm run build:packages
      - name: Build editor
        run: npm run build:editor
      - name: Bundle + smoke-test agent tools (the shipped hearth-cli.mjs / hearth-mcp.mjs)
        run: |
          npm run app:bundle -w @hearth/editor
          node apps/editor/scripts/smoke-tools.mjs
      - name: Report editor chunk sizes
        run: ls -S apps/editor/dist/assets/*.js | head -8 | xargs -I{} sh -c 'printf "%8d  %s\n" "$(wc -c < {})" "{}"'
